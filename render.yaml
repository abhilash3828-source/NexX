services:
  - type: web
    name: nexx-esports-backend
    env: node
    plan: free
    branch: main
    buildCommand: "npm install"
    startCommand: "npm start"
    workingDirectory: "backend"
    envVars:
      - key: PORT
        value: "4000"
      - key: CORS_ORIGIN
        value: "https://<YOUR_FRONTEND_URL>"
      # - key: GOOGLE_SHEET_ID
      #   value: "<YOUR_SHEET_ID>"
      # - key: GOOGLE_SERVICE_ACCOUNT_KEY
      #   value: "{\"type\":\"service_account\", ... }"
